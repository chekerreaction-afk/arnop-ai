<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARNOP — Parallel Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --chat-bg: #0d0d0d;
            --user-bubble: #1a1a2e;
            --ai-bubble: #111111;
            --border: #1f1f1f;
            --accent: #7c3aed;
            --text: #e5e5e5;
            --text-sec: #888;
            --input-bg: #161616;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        .app-container { display: flex; width: 100%; height: 100vh; position: relative; }

        /* Sidebar as an Overlay */
        #sidebar {
            position: fixed;
            right: -280px; 
            top: 0;
            width: 280px;
            height: 100vh;
            background: #090909;
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: right 0.3s ease;
            z-index: 1001; 
            box-shadow: -10px 0 20px rgba(0,0,0,0.5);
        }
        #sidebar.active { right: 0; }

        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        .history-label { 
            padding: 15px 20px 5px; 
            font-size: 11px; 
            font-weight: 700; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid var(--border);
            color: white;
            cursor: pointer;
            font-size: 13px;
            border-radius: 6px;
            transition: 0.2s;
        }
        .new-chat-btn:hover { background: var(--border); }

        .history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item {
            padding: 10px;
            margin-bottom: 5px;
            font-size: 13px;
            color: var(--text-sec);
            cursor: pointer;
            border-radius: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover { background: #1a1a1a; color: white; }

        .chat-main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; height: 100%; }
        
        header { 
            height: 60px; border-bottom: 1px solid var(--border); background: var(--chat-bg); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
        }
        .logo { font-weight: 700; font-size: 18px; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
        }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth;}
        
        .message { display: flex; flex-direction: column; max-width: 90%; animation: fadeIn 0.3s ease; }
        .message.user { align-self: flex-end; }
        .message.ai { align-self: flex-start; width: 100%;}
        
        .bubble { padding: 14px; font-size: 15px; line-height: 1.6; word-wrap: break-word; position: relative; }
        .user .bubble { background: var(--user-bubble); border-radius: 12px 12px 0 12px; border: 1px solid #2a2a4e; }
        .ai .bubble { background: transparent; width: 100%; border-bottom: 1px solid var(--border); padding-left: 0; }

        .consensus-label { font-size: 10px; font-weight: 700; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;}
        .see-all-btn { 
            background: none; border: 1px solid var(--border); color: var(--text-sec); 
            padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-top: 10px; 
        }
        .consensus-panel { display: none; margin-top: 15px; background: #0f0f0f; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .individual-ans { padding: 12px; border-bottom: 1px solid var(--border); }
        .ans-header { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 4px; text-transform: uppercase; }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        #overlay.active { display: block; }

        .input-area { background: var(--bg); padding: 20px; z-index: 10; }
        .input-wrapper { max-width: 850px; margin: 0 auto; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; position: relative; }
        textarea { width: 100%; background: none; border: none; color: var(--text); outline: none; resize: none; font-size: 15px; min-height: 24px; padding-right: 140px;}
        
        .action-btns {
            position: absolute; 
            right: 12px; 
            bottom: 10px; 
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-toggle {
            font-size: 10px;
            font-weight: 600;
            background: #111;
            border: 1px solid var(--border);
            color: var(--text-sec);
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .search-toggle.enabled {
            border-color: var(--accent);
            color: white;
            background: #24143a;
        }

        .send-btn { 
            background: none; border: none; color: var(--accent); 
            font-size: 20px; cursor: pointer; font-weight: bold; 
            display: flex; align-items: center;
        }

        #status-bar { display: none; padding: 10px 20px; align-items: center; gap: 8px; color: var(--accent); font-size: 12px; }
        .spin { width: 10px; height: 10px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: rot 0.8s linear infinite; }
        
        pre { background: #1a1a1a; padding: 15px; border-radius: 8px; margin: 10px 0; overflow-x: auto; position: relative; border: 1px solid #333; }
        .copy-btn { position: absolute; right: 10px; top: 10px; font-size: 10px; background: #333; color: #fff; border: none; padding: 4px 8px; cursor: pointer; border-radius: 4px; }

        @keyframes rot { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleSidebar()"></div>

    <div class="app-container">
        <div id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="startNewChat()">New Chat</button>
            </div>
            <div class="history-label">Chat History</div>
            <div class="history-list" id="history-container"></div>
        </div>

        <div class="chat-main">
            <header>
                <div class="logo">ARN<span>O</span>P</div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div style="font-size: 11px; color: var(--text-sec);">PARALLEL CONSENSUS ENABLED</div>
                    <button class="menu-btn" onclick="toggleSidebar()">⋮</button>
                </div>
            </header>

            <div id="chat-window"></div>
            
            <div id="status-bar">
                <div class="spin"></div>
                <span id="status-text">Processing...</span>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="How can all AIs help you today?" rows="1"></textarea>
                    <div class="action-btns">
                        <button id="search-toggle-btn" class="search-toggle" onclick="toggleSearch()">Search: OFF</button>
                        <button class="send-btn" id="send-btn" onclick="handleSend()">-></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMessages = [];
        let history = JSON.parse(localStorage.getItem('arnop_history') || '[]');
        let userProfile = localStorage.getItem('arnop_user_profile') || 'User tone: helpful. Preferences: clean logic.';
        let searchEnabled = localStorage.getItem('arnop_search_enabled') === 'true';

        // Bug 2 Fix: Module-level cache for providers
        let cachedProviders = null;

        async function getAvailableProviders() {
            if (cachedProviders) return cachedProviders;
            try {
                const r = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ getProviders: true, messages: [], provider: '' })
                });
                const d = await r.json();
                cachedProviders = d.providers || ['groq'];
            } catch(e) {
                cachedProviders = ['groq'];
            }
            return cachedProviders;
        }

        const chatWindow = document.getElementById('chat-window');
        const inputEl = document.getElementById('user-input');
        const statusText = document.getElementById('status-text');
        const statusBar = document.getElementById('status-bar');
        const searchBtn = document.getElementById('search-toggle-btn');

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleSearch() {
            searchEnabled = !searchEnabled;
            localStorage.setItem('arnop_search_enabled', searchEnabled);
            updateSearchUI();
        }

        function updateSearchUI() {
            if (searchEnabled) {
                searchBtn.innerText = "Search: ON";
                searchBtn.classList.add('enabled');
            } else {
                searchBtn.innerText = "Search: OFF";
                searchBtn.classList.remove('enabled');
            }
        }

        async function fetchWebSearch(query) {
            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await response.json();
                if (data.results && data.results.length > 0) {
                    let context = `[Web Search Results for: "${query}"]\n`;
                    data.results.forEach((res, i) => {
                        context += `${i+1}. ${res.title}: ${res.snippet}\n`;
                    });
                    context += `---\nNow answer the user's question using above context if relevant.`;
                    return context;
                }
            } catch (e) {
                console.error("Search failed", e);
            }
            return "";
        }

        async function callAPI(provider, messages) {
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages, provider })
                });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "System failure");
                return data.result;
            } catch (err) { return null; }
        }

        async function handleSend() {
            const val = inputEl.value.trim();
            if (!val) return;

            inputEl.value = '';
            inputEl.style.height = 'auto';
            
            if(currentMessages.length === 0) chatWindow.innerHTML = '';

            const userTurn = { role: 'user', content: val };
            currentMessages.push(userTurn);
            renderMsg(val, 'user');

            statusBar.style.display = 'flex';
            
            let searchContext = "";
            if (searchEnabled) {
                statusText.innerText = "Searching web...";
                searchContext = await fetchWebSearch(val);
            }

            statusText.innerText = "Asking all AIs...";

            const memory = currentMessages.slice(-10);
            const contextMessages = [
                { role: 'system', content: `Identity: ARNOP. User profile analysis: ${userProfile}. ${searchContext}` },
                ...memory
            ];

            // Bug 2 logic applied here: Use cached providers
            const providers = await getAvailableProviders();

            const responses = await Promise.all(providers.map(p => callAPI(p, contextMessages)));
            const validResponses = providers.map((p, i) => ({ provider: p, content: responses[i] }))
                                            .filter(r => r.content !== null);

            if (validResponses.length === 0) {
                renderMsg("Error: Connection failure across all nodes.", 'ai', 'System Error');
                statusBar.style.display = 'none';
                return;
            }

            statusText.innerText = "Filtering best answer...";
            
            let bestIndex = 0;
            // Bug 1 Fix: Replace complex filter prompt and match logic with robust timeout-friendly version
            try {
                if (validResponses.length === 1) {
                    bestIndex = 0;
                } else {
                    const snippets = validResponses.map((r, i) => `[${i}] ${r.content.substring(0, 150)}`).join('\n');
                    const filterResultRaw = await callAPI(providers[0], [{
                        role: 'user',
                        content: `Reply with ONLY this JSON and nothing else: {"winner_index": 0}\nPick best answer for: "${val.substring(0, 100)}"\nOptions:\n${snippets}`
                    }]);
                    if (filterResultRaw) {
                        const match = filterResultRaw.match(/"winner_index"\s*:\s*(\d+)/);
                        if (match) bestIndex = Math.min(parseInt(match[1]) || 0, validResponses.length - 1);
                    }
                }
            } catch (e) { bestIndex = 0; }

            const winner = validResponses[bestIndex] || validResponses[0];
            const winnerText = winner.content;
            
            currentMessages.push({ role: 'assistant', content: winnerText });
            renderConsensus(winnerText, validResponses, winner.provider);

            saveChat();

            if (currentMessages.length % 5 === 0) {
                statusText.innerText = "Updating profile...";
                updateProfile();
            }

            statusText.innerText = "Done";
            setTimeout(() => { statusBar.style.display = 'none'; }, 1000);
        }

        async function updateProfile() {
            const log = currentMessages.slice(-20).map(m => m.content).join('\n');
            const p = `Analyze this for style and code preferences. Summary in 2 sentences. History: ${log}`;
            
            // Bug 2 logic applied here: Use cached providers
            const providers = await getAvailableProviders();
            const filterProvider = providers[0] || 'groq';

            const analysis = await callAPI(filterProvider, [{role: 'user', content: p}]);
            if(analysis) {
                userProfile = analysis;
                localStorage.setItem('arnop_user_profile', analysis);
            }
        }

        function renderMsg(text, role, label = '') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerHTML = `
                ${label ? `<div class="consensus-label">${label}</div>` : ''}
                <div class="bubble">${parseMarkdown(text)}</div>
            `;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function renderConsensus(bestText, allAnswers, winnerName) {
            const id = Date.now();
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ai`;
            
            let answersHtml = allAnswers.map(ans => `
                <div class="individual-ans">
                    <div class="ans-header">${ans.provider}</div>
                    <div class="body">${parseMarkdown(ans.content)}</div>
                </div>
            `).join('');

            msgDiv.innerHTML = `
                <div class="consensus-label">CONSENSUS (SELECTED ${winnerName})</div>
                <div class="bubble">
                    ${parseMarkdown(bestText)}
                    <button class="see-all-btn" id="toggle-${id}">See all responses</button>
                    <div id="panel-${id}" class="consensus-panel">${answersHtml}</div>
                </div>
            `;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            document.getElementById(`toggle-${id}`).onclick = function() {
                const p = document.getElementById(`panel-${id}`);
                const isOpen = p.style.display === 'block';
                p.style.display = isOpen ? 'none' : 'block';
                this.innerText = isOpen ? 'See all responses' : 'Hide responses';
            };
        }

        function parseMarkdown(text) {
            let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
                return `<pre><code>${code.trim()}</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></pre>`;
            });
            html = html.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            return html.replace(/\n/g, '<br>');
        }

        function copyCode(btn) {
            const code = btn.previousElementSibling.innerText;
            navigator.clipboard.writeText(code).then(() => {
                const original = btn.innerText;
                btn.innerText = 'Copied';
                setTimeout(() => btn.innerText = original, 2000);
            });
        }

        function startNewChat() {
            if (currentMessages.length > 0) saveChat();
            currentMessages = [];
            chatWindow.innerHTML = `
                <div style="text-align:center; margin-top: 100px; color: var(--text-sec); font-size: 13px;">
                    Start a fresh parallel conversation. Memory will begin with the user turn.
                </div>
            `;
            if (document.getElementById('sidebar').classList.contains('active')) toggleSidebar();
        }

        function saveChat() {
            if (currentMessages.length < 1) return;
            const existingId = currentMessages[0]?.id;
            const chatObj = {
                id: existingId || Date.now(),
                title: currentMessages[0]?.content.substring(0, 30) || 'New Conversation',
                messages: [...currentMessages]
            };

            if (existingId) {
                history = history.map(h => h.id === existingId ? chatObj : h);
            } else {
                currentMessages[0].id = chatObj.id;
                history.unshift(chatObj);
            }

            if(history.length > 20) history.pop();
            localStorage.setItem('arnop_history', JSON.stringify(history));
            loadSidebar();
        }

        function loadSidebar() {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            history.forEach(h => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerText = h.title;
                div.onclick = () => {
                    loadChat(h.id);
                    toggleSidebar();
                };
                container.appendChild(div);
            });
        }

        function loadChat(id) {
            const target = history.find(h => h.id === id);
            if(target) {
                currentMessages = [...target.messages];
                chatWindow.innerHTML = '';
                currentMessages.forEach(m => {
                    renderMsg(m.content, m.role === 'user' ? 'user' : 'ai', m.role === 'assistant' ? 'HISTORY TURN' : '');
                });
            }
        }

        inputEl.addEventListener('input', () => {
            inputEl.style.height = 'auto';
            inputEl.style.height = inputEl.scrollHeight + 'px';
        });

        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        window.onload = () => {
            loadSidebar();
            startNewChat();
            updateSearchUI();
        };
    </script>
</body>
</html>
