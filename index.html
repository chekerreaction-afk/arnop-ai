<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARNOP — AI Agent System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --chat-bg: #0d0d0d;
            --user-bubble: #1a1a2e;
            --ai-bubble: #1a1a1a;
            --border: #1f1f1f;
            --accent: #7c3aed;
            --text: #e5e5e5;
            --text-sec: #888;
            --input-bg: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        .chat-container { display: flex; width: 100%; height: 100vh; flex-direction: column; }

        header { 
            height: 60px; 
            border-bottom: 1px solid var(--border); 
            background: var(--chat-bg); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; 
        }
        .logo { font-weight: 700; font-size: 18px; color: var(--text); letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        .provider-selector {
            background: #141414;
            color: var(--text-sec);
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
        }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        
        .message { display: flex; flex-direction: column; max-width: 92%; animation: fadeIn 0.3s ease; }
        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.ai { align-self: flex-start; align-items: flex-start; width: 100%;}
        
        .agent-label { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 4px; text-transform: uppercase; }
        .bubble { padding: 8px 0; font-size: 16px; line-height: 1.6; word-wrap: break-word; color: #e5e5e5; }
        .user .bubble { background: var(--user-bubble); padding: 12px 16px; border-radius: 12px 12px 2px 12px; border-left: 3px solid var(--accent); }
        .ai .bubble { background: transparent; border-bottom: 1px solid var(--border); width: 100%; padding-bottom: 15px; }

        /* Multi-AI consensus Styles */
        .consensus-toggle { font-size: 12px; color: var(--text-sec); cursor: pointer; background: none; border: none; padding: 5px 0; text-align: left; margin-top: 10px; }
        .consensus-toggle:hover { color: var(--accent); }
        .consensus-panel { display: none; margin-top: 15px; border: 1px solid var(--border); border-radius: 8px; padding: 10px; background: #0a0a0a; }
        .individual-ans { margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .individual-ans:last-child { margin-bottom: 0; border-bottom: none; }
        .individual-ans header { height: auto; border: none; padding: 0; font-weight: 600; font-size: 12px; color: var(--accent); margin-bottom: 5px; text-transform: uppercase; background: none; }
        .individual-ans .body { font-size: 14px; color: var(--text-sec); line-height: 1.5; }

        .input-area { background: var(--bg); padding: 20px; border-top: 1px solid var(--border); }
        .input-wrapper { max-width: 900px; margin: 0 auto; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; padding: 12px; }
        textarea { width: 100%; background: none; border: none; color: var(--text); outline: none; resize: none; font-size: 16px; min-height: 24px; }
        
        #status-bar { display: none; padding: 10px 20px; align-items: center; gap: 8px; color: var(--accent); font-size: 13px; }
        .spin { width: 12px; height: 12px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: rot 0.8s linear infinite; }
        
        @keyframes rot { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body>

    <div class="chat-container">
        <header>
            <div class="logo">ARN<span>O</span>P</div>
            <select id="selected-provider" class="provider-selector">
                <option value="consensus">Consensus (All AIs)</option>
                <option value="groq">Groq (Llama 3)</option>
                <option value="gemini">Gemini 2.0</option>
                <option value="mistral">Mistral AI</option>
                <option value="deepseek">DeepSeek</option>
            </select>
        </header>

        <div id="chat-window"></div>
        
        <div id="status-bar">
            <div class="spin"></div>
            <span id="status-text">Processing...</span>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" placeholder="Ask me anything..." rows="1"></textarea>
                <div style="display:flex; justify-content: flex-end; margin-top:10px;">
                    <button id="send-btn" style="background:var(--accent); color:white; border:none; padding:8px 18px; border-radius:8px; cursor:pointer; font-weight:600; font-size: 16px;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function apiRequest(provider, messages) {
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages, provider })
                });
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || "Connection failed");
                return data.result;
            } catch (err) {
                throw err;
            }
        }

        // --- Multi-AI Consensus logic start ---
        async function callAllAIs(messages) {
            const providers = ['groq', 'gemini', 'mistral', 'deepseek'];
            const results = await Promise.allSettled(
                providers.map(p => apiRequest(p, messages))
            );
            return results
                .map((r, i) => ({ provider: providers[i], answer: r.status === 'fulfilled' ? r.value : null }))
                .filter(r => r.answer !== null);
        }

        async function filterBestAnswer(userMessage, allAnswers) {
            const filterPrompt = `You are a Filter AI. The user asked: "${userMessage}"
            
Here are answers from multiple AIs:
${allAnswers.map((a, i) => `[${i+1}] ${a.provider}: ${a.answer}`).join('\n\n')}

Select the single best answer. Return ONLY this JSON:
{"best_index": 0, "reason": "brief reason"}
Index is 0-based.`;

            const result = await apiRequest('gemini', [{ role: 'user', content: filterPrompt }]);
            const clean = result.replace(/\`\`\`json|\`\`\`/g, '').trim();
            return JSON.parse(clean);
        }

        function toggleConsensus(id) {
            const panel = document.getElementById(`panel-${id}`);
            const btn = document.getElementById(`btn-${id}`);
            if (panel.style.display === 'none' || panel.style.display === '') {
                panel.style.display = 'block';
                btn.innerText = 'Hide responses';
            } else {
                panel.style.display = 'none';
                btn.innerText = `See all ${btn.dataset.count} responses`;
            }
        }
        // --- Multi-AI Consensus logic end ---

        async function handleSend() {
            const inputEl = document.getElementById('user-input');
            const providerEl = document.getElementById('selected-provider');
            const val = inputEl.value.trim();
            if (!val) return;

            const chatWindow = document.getElementById('chat-window');
            if (chatWindow.querySelector('.empty-note')) chatWindow.innerHTML = '';
            
            appendMsg(val, 'user');
            inputEl.value = '';
            inputEl.style.height = 'auto';

            const provider = providerEl.value;
            const bar = document.getElementById('status-bar');
            const statusText = document.getElementById('status-text');
            bar.style.display = 'flex';

            try {
                if (provider === 'consensus') {
                    statusText.innerText = "Asking all AIs...";
                    const allAnswers = await callAllAIs([{ role: 'user', content: val }]);
                    
                    if (allAnswers.length === 0) throw new Error("No AIs responded");

                    let bestResult = "";
                    if (allAnswers.length >= 2) {
                        statusText.innerText = "Filtering best answer...";
                        const filterResponse = await filterBestAnswer(val, allAnswers);
                        const winner = allAnswers[filterResponse.best_index] || allAnswers[0];
                        bestResult = winner.answer;
                    } else {
                        bestResult = allAnswers[0].answer;
                    }

                    statusText.innerText = "Done";
                    appendConsensusMsg(bestResult, allAnswers, "ARNOP CONSENSUS");
                } else {
                    // Original Multi-agent Loop
                    statusText.innerText = "Processing...";
                    let loopCount = 0;
                    let currentUserInput = val;
                    let lastOutput = "";
                    let isApproved = false;

                    const writerSystemPrompt = `You are ARNOP, a highly capable AI assistant. If asked for code or scripts, provide clean and complete versions. Return only your final response, no meta-commentary.`;

                    while (loopCount < 3 && !isApproved) {
                        loopCount++;
                        const writerOutput = await apiRequest(provider, [
                            { role: "system", content: writerSystemPrompt },
                            { role: "user", content: currentUserInput }
                        ]);
                        lastOutput = writerOutput;
                        isApproved = true; // For single call simplified from original logic context
                    }
                    statusText.innerText = "Done";
                    appendMsg(lastOutput, 'ai', "ARNOP");
                }
            } catch (err) {
                appendMsg("Error: " + err.message, 'ai', "SYSTEM ERROR");
            } finally {
                setTimeout(() => { bar.style.display = 'none'; }, 1500);
            }
        }

        function appendConsensusMsg(bestText, allAnswers, label) {
            const id = Date.now();
            const chat = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `message ai`;
            
            let allHtml = allAnswers.map(ans => `
                <div class="individual-ans">
                    <header>${ans.provider}</header>
                    <div class="body">${ans.answer.replace(/\n/g, '<br>')}</div>
                </div>
            `).join('');

            div.innerHTML = `
                <span class="agent-label">${label}</span>
                <div class="bubble">
                    ${bestText.replace(/\n/g, '<br>')}
                    <button id="btn-${id}" data-count="${allAnswers.length}" class="consensus-toggle" onclick="toggleConsensus('${id}')">See all ${allAnswers.length} responses</button>
                    <div id="panel-${id}" class="consensus-panel">
                        ${allHtml}
                    </div>
                </div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function appendMsg(text, role, label = '') {
            const chat = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                ${label ? `<span class="agent-label">${label}</span>` : ''}
                <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function initEmptyChat() {
            document.getElementById('chat-window').innerHTML = `
                <div class="empty-note" style="text-align:center; padding:100px 20px; color:#444; font-size:13px;">
                    <strong>ARNOP v2</strong> — Multi-AI consensus system enabled<br><br>
                    Ready for your questions. 
                </div>`;
        }

        window.onload = initEmptyChat;

        document.getElementById('send-btn').onclick = handleSend;
        document.getElementById('user-input').oninput = function() {
            this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';
        };
        document.getElementById('user-input').onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        };
    </script>
</body>
</html>
